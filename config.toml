[theme]
# Direzione A — "Diario di classe": carta calda, inchiostro scuro, accento terracotta
base = "light"
primaryColor = "#C97D3D"
backgroundColor = "#F7F1E6"
secondaryBackgroundColor = "#EFE6D3"
textColor = "#3A2E1F"
borderColor = "#E3D9C2"

# Corpo del testo: Inter. Titoli: Source Serif 4 (tocco "diario scolastico").
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
headingFont = "'Source Serif 4':https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600&display=swap"
headingFontWeights = 600

baseRadius = "0.75rem"
buttonRadius = "0.75rem"

dataframeBorderColor = "#E3D9C2"
dataframeHeaderBackgroundColor = "#EFE6D3"

# Colori semantici (success/warning/error/info) riallineati alla palette calda
greenColor = "#6B8F71"
orangeColor = "#C9933D"
redColor = "#A3432D"
blueColor = "#5E7A93"
